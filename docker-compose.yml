services:
  web:
    build:
      context: ./frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - web_node_modules:/app/node_modules
      - web_next_cache:/app/.next
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://192.168.4.134:8000
    command: npm run dev -- --hostname 0.0.0.0
    depends_on:
      - api

  api:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - type: bind
        source: ${MS_TRACKER_UPLOADS_DIR:-./data/uploads}
        target: /app/uploads
    environment:
      DATABASE_URL: postgresql+psycopg://mstracker:mstracker_dev_password@db:5432/mstracker
      STORAGE_BACKEND: local
      UPLOAD_ROOT: /app/uploads
      UPLOADS_DIR: /app/uploads
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      - db

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: mstracker
      POSTGRES_USER: mstracker
      POSTGRES_PASSWORD: mstracker_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
  web_node_modules:
  web_next_cache:
