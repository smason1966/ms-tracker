name dotopoly-prod

services:
  web:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-https://dotopoly.com/api}
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-https://dotopoly.com/api}
    ports:
      - "127.0.0.1:3001:3000"
    command: npm run start -- --hostname 0.0.0.0 --port 3000
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "require('http').get('http://127.0.0.1:3000', r => process.exit(r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))"
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    depends_on:
      - api
    restart: unless-stopped

  api:
    build:
      context: ./backend
    env_file:
      - ${PROD_ENV_FILE:-/opt/dotopoly/env/prod.env}
    ports:
      - "127.0.0.1:8001:8000"
    volumes:
      - type: bind
        source: /opt/dotopoly/data/prod/uploads
        target: /app/uploads
    depends_on:
      - db
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    restart: unless-stopped

  db:
    image: postgres:16
    env_file:
      - ${PROD_ENV_FILE:-/opt/dotopoly/env/prod.env}
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - dotopoly_prod_postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  dotopoly_prod_postgres_data:
