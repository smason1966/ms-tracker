server {
    listen 80;
    server_name dotopoly.com www.dotopoly.com api.dotopoly.com;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name www.dotopoly.com;

    ssl_certificate /etc/letsencrypt/live/dotopoly.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dotopoly.com/privkey.pem;

    return 301 https://dotopoly.com$request_uri;
}

server {
    listen 443 ssl http2;
    server_name dotopoly.com;

    ssl_certificate /etc/letsencrypt/live/dotopoly.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dotopoly.com/privkey.pem;

    # Optional temporary outer gate. Long-term production should use real app auth/MFA.
    auth_basic "Dotopoly";
    auth_basic_user_file /etc/nginx/.htpasswd-dotopoly-prod;

    client_max_body_size 25m;

    location /api/ {
        proxy_pass http://127.0.0.1:8001/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 443 ssl http2;
    server_name api.dotopoly.com;

    ssl_certificate /etc/letsencrypt/live/api.dotopoly.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.dotopoly.com/privkey.pem;

    # Optional temporary outer gate. Long-term production should use real app auth/MFA.
    auth_basic "Dotopoly API";
    auth_basic_user_file /etc/nginx/.htpasswd-dotopoly-prod;

    client_max_body_size 25m;

    location / {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
