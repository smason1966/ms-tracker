server {
    listen 80;
    server_name test.dotopoly.com api-test.dotopoly.com;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name test.dotopoly.com;

    ssl_certificate /etc/letsencrypt/live/test.dotopoly.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/test.dotopoly.com/privkey.pem;

    auth_basic "Dotopoly Test";
    auth_basic_user_file /etc/nginx/.htpasswd-dotopoly-test;

    client_max_body_size 25m;

    location /api/ {
        proxy_pass http://127.0.0.1:8002/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 443 ssl http2;
    server_name api-test.dotopoly.com;

    ssl_certificate /etc/letsencrypt/live/api-test.dotopoly.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api-test.dotopoly.com/privkey.pem;

    auth_basic "Dotopoly Test API";
    auth_basic_user_file /etc/nginx/.htpasswd-dotopoly-test;

    client_max_body_size 25m;

    location / {
        proxy_pass http://127.0.0.1:8002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
